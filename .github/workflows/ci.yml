name: OmniServe CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic requests

      - name: Syntax check backend
        run: python -m py_compile start_omniserve.py

      - name: Syntax check frontend
        run: python -m py_compile frontend/app.py

      - name: Import check (simulated)
        run: |
          python -c "import ast; tree = ast.parse(open('start_omniserve.py').read()); print('Syntax OK')"